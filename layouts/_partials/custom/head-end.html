{{- if eq .Layout "crd" -}}
  {{- $jsCrd := resources.Get "js/crd-schema.js" -}}
  {{- if hugo.IsProduction -}}
    {{- $jsCrd = $jsCrd | minify | fingerprint -}}
  {{- end -}}
<script defer src="{{ $jsCrd.RelPermalink }}"{{ with $jsCrd.Data.Integrity }} integrity="{{ . }}"{{ end }} crossorigin="anonymous"></script>
{{- end -}}
