name: release

on:
  push:
    tags-ignore:
      - 'kafka-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub Container Registry
  GHCR_REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  GHCR_IMAGE_NAME: ${{ github.repository }}
  # Docker Hub image name
  DOCKERHUB_IMAGE: adobe/kafka-operator

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      built_at: ${{ steps.date.outputs.built_at }}
      is_canonical: ${{ steps.canonical.outputs.is_canonical }}
    steps:
      - name: Get tag name
        id: vars
        run: echo "tag=${GITHUB_REF:10}" >> $GITHUB_OUTPUT
      - name: Set Release Date
        id: date
        run: |
          echo "built_at=$(date --rfc-3339=date)" >> $GITHUB_OUTPUT
      - name: Determine if this is a canonical dated release
        id: canonical
        run: |
          # Only dated releases (e.g. 0.28.0-adobe-20260622) get their version
          # references synced back into git; rc/topic/experimental tags don't.
          if [[ "${{ steps.vars.outputs.tag }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-adobe-[0-9]{8}$ ]]; then
            echo "is_canonical=true" >> $GITHUB_OUTPUT
          else
            echo "is_canonical=false" >> $GITHUB_OUTPUT
          fi

  operator-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go

      - name: Clean Go module cache for reproducible builds
        run: |
          # Clean any existing Go module cache for clean, reproducible builds
          sudo rm -rf ~/go/pkg/mod || true
          sudo rm -rf ~/.cache/go-build || true

      - name: Set up Go for root
        run: |
          sudo ln -sf `which go` `sudo which go` || true
          sudo go version
      - name: get go version
        run: go version
      - name: Gofmt and License checks
        run: make check
      - name: unit tests
        run: make test

  build-operator:
    runs-on: ubuntu-latest
    needs: [prepare, operator-test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub Registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Log into GitHub Container Registry ${{ env.GHCR_REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
          labels: |
            org.opencontainers.image.description=Kafka Operator for Kubernetes
      - name: Build and push operator docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            BUILT_AT=${{ needs.prepare.outputs.built_at }}
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}

  release-helm:
    runs-on: ubuntu-latest
    needs: [prepare, build-operator]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Update Chart.yaml version, values.yaml image tag, and README.md
        run: ./scripts/bump-release-version.sh "${{ needs.prepare.outputs.tag }}"
      - name: Push Helm Chart to GHCR
        uses: appany/helm-oci-chart-releaser@v0.5.0
        with:
          name: kafka-operator
          repository: ${{ github.repository_owner }}/helm-charts
          tag: ${{ needs.prepare.outputs.tag }}
          path: charts/kafka-operator
          registry: ${{ env.GHCR_REGISTRY }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          update_dependencies: 'true'

  sync-release-docs:
    # The steps above only bump version references in the ephemeral checkout
    # used to package the chart - they're never committed back to git, so
    # master keeps referring to whichever tag was last bumped by hand. This
    # job closes that gap for canonical dated releases by opening a PR
    # against master (direct pushes are blocked by branch protection).
    runs-on: ubuntu-latest
    needs: [prepare, release-helm]
    if: needs.prepare.outputs.is_canonical == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v7
        with:
          ref: master
      - name: Update version references
        run: ./scripts/bump-release-version.sh "${{ needs.prepare.outputs.tag }}"
      - name: Open PR with version bump
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          commit-message: "Release ${{ needs.prepare.outputs.tag }}"
          title: "Release ${{ needs.prepare.outputs.tag }}"
          body: |
            Automated version reference bump for release `${{ needs.prepare.outputs.tag }}`.

            ---
            *Generated by https://github.com/adobe/koperator/blob/master/.github/workflows/operator-release.yml*
          branch: release-docs/${{ needs.prepare.outputs.tag }}
          base: master
          delete-branch: true
          labels: |
            release
            automated

  sync-gh-pages-version:
    # Keeps gh-pages' docs version in sync with releases. Pushes directly
    # (gh-pages has no branch protection) using secrets.PAT, which also
    # triggers gh-pages to build and deploy the site.
    runs-on: ubuntu-latest
    needs: [prepare, release-helm]
    if: needs.prepare.outputs.is_canonical == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          token: ${{ secrets.PAT }}
      - name: Update docs version
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          CONFIG="config/_default/config.toml"
          sed -i "s/^  latest_version = \"[^\"]*\"/  latest_version = \"${TAG}\"/" "$CONFIG"
          sed -i "s/^  version = \"[^\"]*\"/  version = \"${TAG}\"/" "$CONFIG"
          if git diff --quiet -- "$CONFIG"; then
            echo "Docs version already up to date; nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG"
          git commit -m "Update docs version to ${TAG}"
          git push origin gh-pages
