
title = "Koperator"

baseurl = "https://opensource.adobe.com/koperator/"

[author]
  email = "opensource@adobe.com"

locale = "en-us"

# Language settings
contentDir = "content"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableGitInfo = true
enableRobotsTXT = true

[languages]
[languages.en]
title = "Koperator"
description = "Documentation for Koperator"
label = "English"
# Weight used for sorting.
weight = 1

[outputs]
    home = ["HTML"]
    section = ["HTML"]
    taxonomy = ["HTML"]
    term = ["HTML"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        # See https://imfing.github.io/hextra/docs/guide/latex/
        block = [["\\[", "\\]"], ["$$", "$$"]]
        inline = [["\\(", "\\)"]]
  [markup.highlight]
    noClasses = false

[params]

  description = "Documentation for Koperator, a Kubernetes operator to automate provisioning, management, autoscaling and operations of Apache Kafka clusters deployed to Kubernetes."

  externalLinkDecoration = true

  # latest_version/version below are auto-bumped on every canonical release
  # by .github/workflows/operator-release.yml (master) pushing to this file;
  # that same push also triggers regenerate-crd-docs.yaml (this branch).
  latest_version = "0.28.0-adobe-20260622" # Used in some installation commands

  # The version number for the version of the docs represented in this doc set.
  version = "0.28.0-adobe-20260622"

  # A link to latest version of the docs.
  url_latest_version = "https://opensource.adobe.com/koperator/"

  displayUpdatedDate = true
  dateFormat = "January 2, 2006"

  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "logo.svg"
      link = "/"
      width = 34
      height = 25

  [params.theme]
    # light | dark | system
    default = "system"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true

  [params.editURL]
    enable = true
    # The docs source (content/, layouts/, config/) only exists on the gh-pages
    # branch of this repo (main/master has no content/ dir), so this must point there.
    base = "https://github.com/adobe/koperator/edit/gh-pages/content"

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"

  [params.page]
    # full (100%), wide (90rem), normal (80rem)
    width = "wide"

  [params.highlight]
    [params.highlight.copy]
      enable = true
      display = "hover"

###############################################################################
# Hugo - Top-level navigation (horizontal)
###############################################################################
[[menu.main]]
  name = "Documentation"
  pageRef = "/docs"
  weight = 1
[[menu.main]]
  name = "Search"
  weight = 2
  [menu.main.params]
    type = "search"
[[menu.main]]
  name = "GitHub"
  weight = 3
  url = "https://github.com/adobe/koperator"
  [menu.main.params]
    icon = "github"

###############################################################################
# Misc customizations
###############################################################################

# Image processing configuration.
[imaging]
resampleFilter = "CatmullRom"
anchor = "smart"
[imaging.jpeg]
quality = 75
[imaging.webp]
quality = 75
[imaging.avif]
quality = 75

[minify]
  minifyOutput = true
  disableJSON = true
  [minify.tdewolff]
    [minify.tdewolff.html]
    keepQuotes = true
    keepWhitespace = true

[sitemap]
  ChangeFreq = "daily"
  Priority = "1"

[security]
  [security.funcs]
    getenv = ['^HUGO_', 'PWD', '^DOC_', 'ENVIRONMENT']

[module]
proxy = "direct"
[[module.imports]]
path = "github.com/imfing/hextra"
