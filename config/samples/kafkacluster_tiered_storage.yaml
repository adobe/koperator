apiVersion: kafka.banzaicloud.io/v1beta1
kind: KafkaCluster
metadata:
  labels:
    controller-tools.k8s.io: "1.0"
  name: kafka-tiered-storage
spec:
  kRaft: true
  headlessServiceEnabled: true
  oneBrokerPerNode: false
  clusterImage: "ghcr.io/adobe/koperator/kafka:2.13-3.9.1"
  
  # Cluster-wide Kafka configuration including tiered storage settings
  readOnlyConfig: |
    auto.create.topics.enable=false
    cruise.control.metrics.topic.auto.create=true
    cruise.control.metrics.topic.num.partitions=1
    cruise.control.metrics.topic.replication.factor=2
    
    # Tiered Storage Configuration
    # Enable remote storage
    remote.log.storage.system.enable=true
    
    # Remote storage manager class implementation
    remote.log.storage.manager.class.name=org.apache.kafka.server.log.remote.storage.RemoteLogStorageManager
    
    # Remote log metadata manager class implementation  
    remote.log.metadata.manager.class.name=org.apache.kafka.server.log.remote.metadata.storage.TopicBasedRemoteLogMetadataManager
    
    # Remote storage manager configuration prefix
    rsm.config.remote.storage.manager.impl.class=org.apache.kafka.server.log.remote.storage.RemoteLogStorageManager
    
    # Tiered storage cache configuration - this path matches the tieredStorageCache volume mount
    rsm.config.fetch.chunk.cache.path=/tiered-storage-cache
    
  brokers:
    - id: 0
      brokerConfig:
        # Process roles for KRaft mode
        processRoles:
          - broker
        
        # Storage configurations
        storageConfigs:
          # Primary Kafka log storage - included in Cruise Control capacity
          - mountPath: "/kafka-logs"
            pvcSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 100Gi
          
          # Tiered storage cache - excluded from Cruise Control capacity and log.dirs
          - mountPath: "/tiered-storage-cache"
            tieredStorageCache: true
            pvcSpec:
              accessModes:
                - ReadWriteOnce
              # Can use a different storage class optimized for cache (e.g., faster SSD)
              # storageClassName: fast-ssd
              resources:
                requests:
                  storage: 50Gi
        
        resourceRequirements:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 2Gi
    
    - id: 1
      brokerConfig:
        processRoles:
          - broker
        
        storageConfigs:
          - mountPath: "/kafka-logs"
            pvcSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 100Gi
          
          - mountPath: "/tiered-storage-cache"
            tieredStorageCache: true
            pvcSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
        
        resourceRequirements:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 2Gi
    
    - id: 2
      brokerConfig:
        processRoles:
          - broker
        
        storageConfigs:
          - mountPath: "/kafka-logs"
            pvcSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 100Gi
          
          - mountPath: "/tiered-storage-cache"
            tieredStorageCache: true
            pvcSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
        
        resourceRequirements:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 2Gi

  listenersConfig:
    internalListeners:
      - type: "plaintext"
        name: "internal"
        containerPort: 29092
        usedForInnerBrokerCommunication: true
      - type: "plaintext"
        name: "controller"
        containerPort: 29093
        usedForInnerBrokerCommunication: false
        usedForControllerCommunication: true

