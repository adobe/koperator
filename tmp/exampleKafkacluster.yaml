          -XX:+ExplicitGCInvokesConcurrent -XX:MetaspaceSize=96m -XX:G1HeapRegionSize=16M
          -XX:MinMetaspaceFreeRatio=50 -XX:MaxMetaspaceFreeRatio=80 -Djava.awt.headless=true
          -Dsun.net.inetaddr.ttl=60 -Dcom.sun.management.jmxremote.port=1090 -Dcom.sun.management.jmxremote.rmi.port=1090
          -Dcom.sun.management.jmxremote.local.only=false -Djava.rmi.server.hostname=127.0.0.1
          -Djute.maxbuffer=0x9fffff
        log4jConfig: |-
          log4j.rootLogger=INFO, stdout

          log4j.appender.stdout=org.apache.log4j.ConsoleAppender
          log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
          log4j.appender.stdout.layout.ConversionPattern=[%d] %p %m (%c)%n

          # Change the line below to adjust ZK client logging
          log4j.logger.org.apache.zookeeper=INFO

          # Change the two lines below to adjust the general broker logging level (output to server.log and stdout)
          log4j.logger.kafka=INFO
          log4j.logger.org.apache.kafka=INFO

          # Change to DEBUG or TRACE to enable request logging
          log4j.logger.kafka.request.logger=WARN

          # Uncomment the lines below and change log4j.logger.kafka.network.RequestChannel$ to TRACE for additional output
          # related to the handling of requests
          #log4j.logger.kafka.network.Processor=TRACE, requestAppender
          #log4j.logger.kafka.server.KafkaApis=TRACE, requestAppender
          #
          log4j.logger.kafka.network.RequestChannel$=WARN
          log4j.logger.kafka.controller=DEBUG
          log4j.logger.kafka.log.LogCleaner=INFO
          log4j.logger.state.change.logger=INFO

          # Access denials are logged at INFO level, change to DEBUG to also log allowed accesses
          log4j.logger.kafka.authorizer.logger=INFO

          # Additional logging to reduce noise
          log4j.logger.org.apache.kafka.common.network.Selector=WARN
        resourceRequirements:
